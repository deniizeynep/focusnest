<svg width="1600" height="1000" viewBox="0 0 1600 1000" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="1000" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0C111D"/>
      <stop offset="0.52" stop-color="#121826"/>
      <stop offset="1" stop-color="#172033"/>
    </linearGradient>
    <linearGradient id="phone" x1="462" y1="128" x2="462" y2="872" gradientUnits="userSpaceOnUse">
      <stop stop-color="#151C2B"/>
      <stop offset="1" stop-color="#0F1522"/>
    </linearGradient>
    <linearGradient id="phone2" x1="1138" y1="128" x2="1138" y2="872" gradientUnits="userSpaceOnUse">
      <stop stop-color="#161F2E"/>
      <stop offset="1" stop-color="#0F1420"/>
    </linearGradient>
    <linearGradient id="timerRing" x1="462" y1="244" x2="462" y2="544" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF928B"/>
      <stop offset="0.48" stop-color="#F6C77E"/>
      <stop offset="1" stop-color="#9DE0C7"/>
    </linearGradient>
    <linearGradient id="chartGrad" x1="990" y1="394" x2="1286" y2="394" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8BE0C0"/>
      <stop offset="1" stop-color="#B6A5FF"/>
    </linearGradient>
    <filter id="shadow" x="-40%" y="-40%" width="180%" height="180%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="34" stdDeviation="36" flood-color="#030712" flood-opacity="0.46"/>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="28" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 1 0 1 0 0 0.55 0 0 1 0 0.43 0 0 0 0.38 0"/>
      <feBlend in2="SourceGraphic" mode="screen"/>
    </filter>
    <style>
      .title { font: 700 38px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #F8FAFC; letter-spacing: 0; }
      .h1 { font: 700 29px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #F8FAFC; letter-spacing: 0; }
      .h2 { font: 700 20px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #EEF2FF; letter-spacing: 0; }
      .label { font: 600 15px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #A9B5C8; letter-spacing: 0; }
      .small { font: 500 13px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #75839B; letter-spacing: 0; }
      .time { font: 800 56px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #FFFFFF; letter-spacing: 0; }
      .metric { font: 800 31px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #FFFFFF; letter-spacing: 0; }
      .mono { font: 700 16px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #F8FAFC; letter-spacing: 0; }
    </style>
  </defs>

  <rect width="1600" height="1000" fill="url(#bg)"/>
  <circle cx="270" cy="135" r="155" fill="#203B4B" opacity="0.28"/>
  <circle cx="1376" cy="842" r="220" fill="#372B58" opacity="0.28"/>
  <circle cx="818" cy="188" r="95" fill="#365B4D" opacity="0.2"/>

