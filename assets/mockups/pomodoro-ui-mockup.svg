    <line x1="1002" y1="538" x2="1268" y2="538" stroke="#263146" stroke-width="1"/>
    <line x1="1002" y1="488" x2="1268" y2="488" stroke="#263146" stroke-width="1"/>
    <path d="M1010 568C1040 526 1068 547 1094 512C1128 468 1154 490 1182 457C1218 416 1242 458 1262 435" stroke="url(#chartGrad)" stroke-width="7" stroke-linecap="round"/>
    <path d="M1010 568C1040 526 1068 547 1094 512C1128 468 1154 490 1182 457C1218 416 1242 458 1262 435L1262 588H1010V568Z" fill="url(#chartGrad)" opacity="0.13"/>
    <circle cx="1182" cy="457" r="8" fill="#B6A5FF"/>
    <text x="1004" y="615" class="small">Pzt</text>
    <text x="1051" y="615" class="small">Sal</text>
    <text x="1097" y="615" class="small">Çar</text>
    <text x="1144" y="615" class="small">Per</text>
    <text x="1191" y="615" class="small">Cum</text>
    <text x="1237" y="615" class="small">Cmt</text>

    <text x="976" y="681" class="h2">Seans hedefleri</text>
    <g>
