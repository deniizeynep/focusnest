      <rect x="976" y="778" width="186" height="18" rx="9" fill="#9DE0C7"/>
      <text x="976" y="825" class="label">Kısa molalar</text>
      <text x="1252" y="825" text-anchor="end" class="label">59%</text>
    </g>

    <g>
      <circle cx="1234" cy="670" r="43" fill="#1F2A3D"/>
      <circle cx="1234" cy="670" r="31" stroke="#303D55" stroke-width="10"/>
      <path d="M1234 639a31 31 0 1 1-25.1 49.2" stroke="#F6C77E" stroke-width="10" stroke-linecap="round"/>
      <text x="1234" y="676" text-anchor="middle" class="mono">12</text>
