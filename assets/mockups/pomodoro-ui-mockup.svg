      <path d="M401 605h16M409 597v16" stroke="#F8FAFC" stroke-width="3" stroke-linecap="round"/>
      <circle cx="462" cy="605" r="36" fill="#FF8E88"/>
      <path d="M454 592h7v26h-7zM464 592h7v26h-7z" fill="#111827"/>
      <circle cx="515" cy="605" r="27" fill="#233147"/>
      <path d="M508 596l18 9-18 9v-18z" fill="#F8FAFC"/>
    </g>

    <text x="300" y="668" class="h2">Bugünkü görevler</text>
    <g>
