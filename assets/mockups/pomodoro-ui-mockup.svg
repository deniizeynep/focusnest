    <rect x="936" y="146" width="404" height="708" rx="40" fill="url(#phone2)"/>
    <rect x="1088" y="160" width="100" height="10" rx="5" fill="#2B3448"/>
  </g>

  <g>
    <text x="976" y="218" class="label">Haftalık görünüm</text>
    <text x="976" y="253" class="h1">İstatistik</text>
    <rect x="1208" y="205" width="84" height="36" rx="18" fill="#213047"/>
    <text x="1250" y="228" text-anchor="middle" class="small" fill="#C7D2FE">Haziran</text>

    <rect x="976" y="286" width="140" height="96" rx="22" fill="#1C2638"/>
    <text x="1000" y="319" class="small">Odak</text>
    <text x="1000" y="357" class="metric">8.4s</text>
    <rect x="1132" y="286" width="160" height="96" rx="22" fill="#1C2638"/>
